# Auto increment the develop branch app.json version no when a pull reuest us closed on develop.
name: Auto Increment Version on Develop Merge

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  increment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHTOKENWORKFLOW }}

      - uses: microsoft/AL-Go-Actions/IncrementVersionNumber@main
        with:
          projectNamePatterns: '*'
          updatedVersionNumber: '+0.0.1'   # or '+0.1' for minor
          token: ${{ secrets.GHTOKENWORKFLOW }}

      - name: Create Version Bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Auto-increment version after merge to develop"
          title: "Auto version bump (develop)"
          body: "Automatic patch increment after PR merge to develop"
          branch: "auto-version-develop"